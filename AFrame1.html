<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame Hand Movement</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
      AFRAME.registerComponent('pinch-move', {
        schema: {
          speed: { default: 1.5 }
        },

        init: function () {
          this.isPinching = false;
          this.rig = document.querySelector('#rig');

          this.el.addEventListener('pinchstarted', () => {
            this.isPinching = true;
          });

          this.el.addEventListener('pinchended', () => {
            this.isPinching = false;
          });
        },

        tick: function (time, delta) {
          if (!this.isPinching || !this.rig) return;

          const camera = document.querySelector('[camera]');
          if (!camera) return;

          const direction = new AFRAME.THREE.Vector3();
          camera.object3D.getWorldDirection(direction);

          direction.y = 0;
          direction.normalize();

          const distance = this.data.speed * (delta / 1000);

          // Subtract instead of add so pinch moves in the direction you're facing.
          this.rig.object3D.position.sub(direction.multiplyScalar(distance));
        }
      });
    </script>
  </head>

  <body>
    <a-scene>
      <a-sky color="#ECECEC"></a-sky>

      <a-plane
        position="0 0 -4"
        rotation="-90 0 0"
        width="20"
        height="20"
        color="#7BC8A4">
      </a-plane>

      <a-box position="0 1 -3" color="#4CC3D9"></a-box>
      <a-box position="1.5 1 -3" color="green"></a-box>
      <a-sphere position="3 1 -3" color="#4CC3D9"></a-sphere>
      <a-cone position="4.5 1 -3" color="red"></a-cone>

      <a-entity
        position="0 2 -3"
        text="value: Pinch right hand to move forward; color: red; width: 6; align: center">
      </a-entity>

      <a-entity id="rig" position="0 0 2">
        <a-camera position="0 1.6 0"></a-camera>

        <a-entity hand-tracking-controls="hand: left; modelColor: #cccccc"></a-entity>

        <a-entity
          hand-tracking-controls="hand: right; modelColor: #cccccc"
          pinch-move="speed: 1.8">
        </a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
