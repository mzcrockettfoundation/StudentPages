<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame Hand Movement</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <script>
      AFRAME.registerComponent('pinch-move', {
        schema: {
          speed: { default: 1.5 }
        },

        init: function () {
          this.isPinching = false;
          this.rig = document.querySelector('#rig');

          this.el.addEventListener('pinchstarted', () => {
            this.isPinching = true;
          });

          this.el.addEventListener('pinchended', () => {
            this.isPinching = false;
          });
        },

        tick: function (time, delta) {
          if (!this.isPinching || !this.rig) return;

          const camera = document.querySelector('[camera]');
          if (!camera) return;

          const direction = new AFRAME.THREE.Vector3();
          camera.object3D.getWorldDirection(direction);

          direction.y = 0;
          direction.normalize();

          const distance = this.data.speed * (delta / 1000);
          this.rig.object3D.position.add(direction.multiplyScalar(distance));
        }
      });
    </script>
  </head>

  <body>
    <a-scene>
      <a-assets>
        <img
          id="cat"
          src="https://images.pexels.com/photos/104827/cat-pet-animal-domestic-104827.jpeg?cs=srgb&dl=pexels-pixabay-104827.jpg&fm=jpg"
        >
      </a-assets>

      <a-sky color="#ECECEC"></a-sky>

      <a-plane
        position="0 0 -4"
        rotation="-90 0 0"
        width="20"
        height="20"
        color="#7BC8A4">
      </a-plane>

      <a-image position="-2 1.5 -3" width="2" height="1.5" src="#cat"></a-image>
      <a-box position="0 1 -3" color="#4CC3D9"></a-box>
      <a-box position="1.5 1 -3" color="green"></a-box>
      <a-sphere position="3 1 -3" color="#4CC3D9"></a-sphere>
      <a-cone position="4.5 1 -3" color="red"></a-cone>
      <a-box position="1.5 1 -1" material="src: #cat"></a-box>

      <a-entity
        position="0 2 -3"
        text="value: Welcome to the Crockett Room; color: red; width: 6; align: center">
      </a-entity>

      <a-entity id="rig" position="0 0 2">
        <a-camera position="0 1.6 0"></a-camera>
      </a-entity>

      <a-entity
        hand-tracking-controls="hand: left; modelColor: #cccccc">
      </a-entity>

      <a-entity
        hand-tracking-controls="hand: right; modelColor: #cccccc"
        pinch-move="speed: 1.8">
      </a-entity>
    </a-scene>
  </body>
</html>
